name: Test Action

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      cli-version:
        description: 'CLI version to test'
        required: false
        default: 'latest'

jobs:
  test-install:
    name: Test CLI Installation
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      
      - name: Test install script
        shell: bash
        run: |
          ./scripts/install-cli.sh ${{ github.event.inputs.cli-version || 'latest' }}
          
      - name: Verify installation
        shell: bash
        run: |
          export PATH="$HOME/.dotenv/bin:$PATH"
          dotenv version

  test-action:
    name: Test Action
    runs-on: ubuntu-latest
    needs: test-install
    steps:
      - uses: actions/checkout@v4
      
      - name: Create test secrets
        run: |
          # This would normally be done in the DotEnv platform
          # For testing, we'll create a mock response
          echo "TEST_VAR=test_value" > expected.env
          echo "API_URL=https://api.example.com" >> expected.env
          echo "DEBUG=true" >> expected.env
      
      - name: Test basic pull
        uses: ./
        with:
          api-key: ${{ secrets.DOTENV_TEST_API_KEY || 'test-key' }}
          project: test-project
        continue-on-error: true
      
      - name: Test with target
        uses: ./
        with:
          api-key: ${{ secrets.DOTENV_TEST_API_KEY || 'test-key' }}
          project: test-project
          target: staging
        continue-on-error: true
      
      - name: Test with full hierarchy
        uses: ./
        with:
          api-key: ${{ secrets.DOTENV_TEST_API_KEY || 'test-key' }}
          project: test-project
          target: production
          environment: api
        continue-on-error: true
      
      - name: Test JSON format
        uses: ./
        with:
          api-key: ${{ secrets.DOTENV_TEST_API_KEY || 'test-key' }}
          project: test-project
          format: json
          output-file: secrets.json
        continue-on-error: true
      
      - name: Test export variables
        uses: ./
        with:
          api-key: ${{ secrets.DOTENV_TEST_API_KEY || 'test-key' }}
          project: test-project
          export-variables: true
        continue-on-error: true
      
      - name: Verify exported variables
        if: env.TEST_VAR != ''
        run: |
          echo "✅ Variables were exported successfully"
          echo "TEST_VAR=$TEST_VAR"

  test-error-handling:
    name: Test Error Handling
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Test with invalid API key
        id: invalid-key
        uses: ./
        with:
          api-key: 'invalid-key-12345'
          project: test-project
        continue-on-error: true
      
      - name: Check error handling
        if: steps.invalid-key.outcome == 'failure'
        run: echo "✅ Error handling works correctly"

  test-matrix:
    name: Test Matrix Builds
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target: [staging, production]
        format: [env, json, yaml]
    steps:
      - uses: actions/checkout@v4
      
      - name: Test ${{ matrix.target }} - ${{ matrix.format }}
        uses: ./
        with:
          api-key: ${{ secrets.DOTENV_TEST_API_KEY || 'test-key' }}
          project: test-project
          target: ${{ matrix.target }}
          format: ${{ matrix.format }}
          output-file: output.${{ matrix.format }}
        continue-on-error: true
      
      - name: Check output file
        run: |
          if [ -f "output.${{ matrix.format }}" ]; then
            echo "✅ Output file created: output.${{ matrix.format }}"
            ls -la output.${{ matrix.format }}
          else
            echo "⚠️ Output file not created (expected in test environment)"
          fi

  integration-test:
    name: Integration Test
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && secrets.DOTENV_TEST_API_KEY != ''
    steps:
      - uses: actions/checkout@v4
      
      - name: Real integration test
        uses: ./
        with:
          api-key: ${{ secrets.DOTENV_TEST_API_KEY }}
          project: ${{ secrets.DOTENV_TEST_PROJECT }}
          target: staging
          export-variables: true
      
      - name: Verify real secrets
        run: |
          # Check if any variables were exported
          env | grep -E '^[A-Z_]+=' | head -5
          echo "✅ Integration test completed"

  release:
    name: Release Check
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: [test-install, test-action, test-error-handling, test-matrix]
    steps:
      - uses: actions/checkout@v4
      
      - name: Check if release needed
        run: |
          echo "All tests passed!"
          echo "Ready for release when tagged"