name: Test Action

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      cli-version:
        description: 'CLI version to test'
        required: false
        default: 'latest'

jobs:
  test-install:
    name: Test CLI Installation
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v5

      - name: Test install script
        shell: bash
        run: |
          ./scripts/install-cli.sh ${{ github.event.inputs.cli-version || 'latest' }}

      - name: Verify installation
        shell: bash
        run: |
          export PATH="$HOME/.dotenv/bin:$PATH"
          dotenv version

  test-input-validation:
    name: Test Input Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Test with invalid project name
        id: invalid-project
        uses: ./
        with:
          api-key: test-key
          project: 'invalid/../../path'
        continue-on-error: true

      - name: Check project validation
        run: |
          if [[ "${{ steps.invalid-project.outcome }}" != "failure" ]]; then
            echo "❌ Invalid project name should have failed"
            exit 1
          fi
          echo "✅ Project validation works correctly"

      - name: Test with invalid characters
        id: invalid-chars
        uses: ./
        with:
          api-key: test-key
          project: 'test@#$%project'
        continue-on-error: true

      - name: Check character validation
        run: |
          if [[ "${{ steps.invalid-chars.outcome }}" != "failure" ]]; then
            echo "❌ Invalid characters should have failed"
            exit 1
          fi
          echo "✅ Character validation works correctly"

      - name: Test with invalid format
        id: invalid-format
        uses: ./
        with:
          api-key: test-key
          project: test-project
          format: invalid-format
        continue-on-error: true

      - name: Check format validation
        run: |
          if [[ "${{ steps.invalid-format.outcome }}" != "failure" ]]; then
            echo "❌ Invalid format should have failed"
            exit 1
          fi
          echo "✅ Format validation works correctly"

  integration-test:
    name: Integration Test
    runs-on: ubuntu-latest
    # `secrets` is not a valid context in a job-level `if`, so gate on the
    # event here and skip the secret-dependent steps below when the key is
    # absent (e.g. on forks).
    if: github.event_name == 'workflow_dispatch'
    env:
      DOTENV_TEST_API_KEY: ${{ secrets.DOTENV_TEST_API_KEY }}
    steps:
      - uses: actions/checkout@v5

      - name: Real integration test
        if: env.DOTENV_TEST_API_KEY != ''
        uses: ./
        with:
          api-key: ${{ secrets.DOTENV_TEST_API_KEY }}
          project: ${{ secrets.DOTENV_TEST_PROJECT }}
          target: staging
          export-variables: true

      - name: Verify real secrets
        if: env.DOTENV_TEST_API_KEY != ''
        run: |
          # Check if any variables were exported
          env | grep -E '^[A-Z_]+=' | head -5
          echo "✅ Integration test completed"

  release:
    name: Release Check
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: [test-install, test-input-validation]
    steps:
      - uses: actions/checkout@v5

      - name: Check if release needed
        run: |
          echo "All tests passed!"
          echo "Ready for release when tagged"
