name: 'DotEnv Secrets'
description: 'Pull and manage environment variables from DotEnv platform'
author: 'DotEnv'
branding:
  icon: 'lock'
  color: 'purple'

inputs:
  api-key:
    description: 'DotEnv API key for authentication'
    required: true
  project:
    description: 'Project name to pull secrets from'
    required: true
  target:
    description: 'Target environment (e.g., production, staging)'
    required: false
    default: ''
  environment:
    description: 'Specific environment within target (e.g., api, web)'
    required: false
    default: ''
  output-file:
    description: 'Path to write the .env file'
    required: false
    default: '.env'
  format:
    description: 'Output format (env, json, yaml, shell, dockerfile)'
    required: false
    default: 'env'
  export-variables:
    description: 'Export secrets as GitHub environment variables'
    required: false
    default: 'false'
  organization:
    description: 'Organization to use (if different from default)'
    required: false
    default: ''
  api-url:
    description: 'Custom API URL (for testing/enterprise)'
    required: false
    default: ''
  decrypt:
    description: 'Decrypt secrets (disable for raw encrypted values)'
    required: false
    default: 'true'
  resolve:
    description: 'Resolve variable interpolation'
    required: false
    default: 'false'
  quiet:
    description: 'Suppress output'
    required: false
    default: 'false'
  merge:
    description: 'Merge secrets from all hierarchy levels'
    required: false
    default: 'true'
  cli-version:
    description: 'CLI version to install: "latest" (default, newest stable release), "nightly" (rolling main HEAD), an exact version ("1.2.3"), or a partial version ("1" → newest 1.x.x, "1.2" → newest 1.2.x)'
    required: false
    default: 'latest'

runs:
  using: 'composite'
  steps:
    - name: Install DotEnv CLI
      shell: bash
      run: |
        echo "Installing DotEnv CLI..."
        ${{ github.action_path }}/scripts/install-cli.sh "${{ inputs.cli-version }}"
      env:
        # Scoped to the CONSUMER's repo, not dotenvcloud/cli. This only raises
        # the API rate limit — the dotenvcloud/cli releases must stay PUBLIC for
        # asset downloads to work (a private repo would 404 here).
        GITHUB_TOKEN: ${{ github.token }}

    - name: Configure CLI
      shell: bash
      run: |
        # Mask the API key immediately
        echo "::add-mask::${{ inputs.api-key }}"
        
        # Set API key
        export DOTENV_API_KEY="${{ inputs.api-key }}"
        
        # Set optional configurations
        if [[ -n "${{ inputs.organization }}" ]]; then
          export DOTENV_ORGANIZATION="${{ inputs.organization }}"
        fi
        
        if [[ -n "${{ inputs.api-url }}" ]]; then
          export DOTENV_API_URL="${{ inputs.api-url }}"
        fi
        
        # Export for subsequent steps (the value will be masked in logs)
        echo "DOTENV_API_KEY=$DOTENV_API_KEY" >> $GITHUB_ENV
        if [[ -n "$DOTENV_ORGANIZATION" ]]; then
          echo "DOTENV_ORGANIZATION=$DOTENV_ORGANIZATION" >> $GITHUB_ENV
        fi
        if [[ -n "$DOTENV_API_URL" ]]; then
          echo "DOTENV_API_URL=$DOTENV_API_URL" >> $GITHUB_ENV
        fi
        
        echo "✅ CLI configured successfully"

    - name: Validate inputs
      shell: bash
      run: |
        # Function to validate input names
        validate_name() {
          local name="$1"
          local field="$2"
          
          # Check for empty name (allowed for optional fields)
          if [[ -z "$name" ]]; then
            return 0
          fi
          
          # Check length (max 100 characters)
          if [[ ${#name} -gt 100 ]]; then
            echo "❌ Error: $field name is too long (max 100 characters)"
            exit 1
          fi
          
          # Check for valid characters (alphanumeric, dash, underscore, dot)
          if ! [[ "$name" =~ ^[a-zA-Z0-9._-]+$ ]]; then
            echo "❌ Error: $field name contains invalid characters"
            echo "   Allowed: letters, numbers, dash, underscore, dot"
            echo "   Provided: $name"
            exit 1
          fi
          
          # Check for path traversal attempts
          if [[ "$name" =~ \.\. ]] || [[ "$name" =~ ^/ ]] || [[ "$name" =~ /$ ]]; then
            echo "❌ Error: $field name contains invalid path characters"
            exit 1
          fi
        }
        
        # Validate each input
        validate_name "${{ inputs.project }}" "Project"
        validate_name "${{ inputs.target }}" "Target"
        validate_name "${{ inputs.environment }}" "Environment"
        
        # Validate format
        if ! [[ "${{ inputs.format }}" =~ ^(env|json|yaml|shell|dockerfile)$ ]]; then
          echo "❌ Error: Invalid format '${{ inputs.format }}'"
          echo "   Allowed: env, json, yaml, shell, dockerfile"
          exit 1
        fi
        
        echo "✅ Input validation passed"

    - name: Build path
      id: build-path
      shell: bash
      run: |
        # Build the path from project/target/environment
        path="${{ inputs.project }}"
        
        if [[ -n "${{ inputs.target }}" ]]; then
          path="$path/${{ inputs.target }}"
          
          if [[ -n "${{ inputs.environment }}" ]]; then
            path="$path/${{ inputs.environment }}"
          fi
        fi
        
        echo "path=$path" >> $GITHUB_OUTPUT
        echo "Pulling secrets from: $path"

    - name: Pull secrets
      shell: bash
      run: |
        # Execute dotenv pull with safe argument handling
        args=("pull" "${{ steps.build-path.outputs.path }}")
        
        # Add format flag
        args+=("--format=${{ inputs.format }}")
        
        # Add output file
        args+=("--output=${{ inputs.output-file }}")
        
        # Add optional flags
        if [[ "${{ inputs.decrypt }}" == "false" ]]; then
          args+=("--decrypt=false")
        fi
        
        if [[ "${{ inputs.resolve }}" == "true" ]]; then
          args+=("--resolve")
        fi
        
        if [[ "${{ inputs.quiet }}" == "true" ]]; then
          args+=("--quiet")
        fi
        
        if [[ "${{ inputs.merge }}" == "false" ]]; then
          args+=("--merge=false")
        fi
        
        # Execute the command safely
        echo "Executing: dotenv ${args[@]}"
        if ! dotenv "${args[@]}"; then
          echo "❌ Failed to pull secrets"
          exit 1
        fi
        
        # Check if file was created
        if [[ -f "${{ inputs.output-file }}" ]]; then
          echo "✅ Secrets written to ${{ inputs.output-file }}"
        else
          echo "❌ Failed to create ${{ inputs.output-file }}"
          exit 1
        fi

    - name: Set env-file output
      id: set-env-file
      shell: bash
      run: echo "path=${{ inputs.output-file }}" >> $GITHUB_OUTPUT

    - name: Export variables
      if: ${{ inputs.export-variables == 'true' && inputs.format == 'env' }}
      shell: bash
      run: |
        echo "Exporting variables to GitHub environment..."
        
        # Read the env file and export variables
        while IFS= read -r line; do
          # Skip empty lines and comments
          if [[ -z "$line" ]] || [[ "$line" =~ ^[[:space:]]*# ]]; then
            continue
          fi
          
          # Check if it's a valid KEY=VALUE format
          if [[ "$line" =~ ^[[:alnum:]_]+= ]]; then
            # Extract key
            key="${line%%=*}"
            # Extract value (everything after first =)
            value="${line#*=}"
            
            # Remove surrounding quotes if present
            value="${value%\"}"
            value="${value#\"}"
            value="${value%\'}"
            value="${value#\'}"
            
            # Export to GitHub environment
            echo "$key=$value" >> $GITHUB_ENV
            
            # Mask secret values in logs
            echo "::add-mask::$value"
            
            echo "✅ Exported: $key"
          fi
        done < "${{ inputs.output-file }}"

outputs:
  env-file:
    description: 'Path to the generated environment file'
    value: ${{ steps.set-env-file.outputs.path }}